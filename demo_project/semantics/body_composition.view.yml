name: body_composition
description: Daily body composition measurements — weight and body fat tracking.
datasource: training
table: "body_composition.csv"

entities:
  - name: body_measurement
    type: primary
    key: date

dimensions:
  - name: date
    type: datetime
    expr: "\"Datetime (Local)\""
    description: Measurement datetime (YYYY-MM-DD HH:MM)

measures:
  - name: weight_lbs
    type: average
    expr: "\"Weight (lbs)\""
    description: Body weight in pounds
  - name: body_fat_caliper
    type: average
    expr: "\"Body Fat % (Caliper - Gut)\""
    description: Body fat percentage measured by caliper (gut)
  - name: body_fat_omron
    type: average
    expr: "\"Body Fat % (Omron)\""
    description: Body fat percentage measured by Omron device
  - name: measurement_count
    type: count
    description: Number of measurements taken
  - name: min_weight
    type: min
    expr: "\"Weight (lbs)\""
    description: Minimum recorded weight in lbs
  - name: max_weight
    type: max
    expr: "\"Weight (lbs)\""
    description: Maximum recorded weight in lbs
