# yaml-language-server: $schema=https://raw.githubusercontent.com/oxy-hq/oxygen/refs/heads/main/json-schemas/config.json
defaults:
  database: local
  agent: default.agent.yml
models:
  - vendor: anthropic
    name: claude-sonnet-4-6
    model_ref: claude-sonnet-4-6
    key_var: ANTHROPIC_API_KEY
  - vendor: anthropic
    name: claude
    model_ref: claude-sonnet-4-6
    key_var: ANTHROPIC_API_KEY

databases:
  - name: local
    dataset: .db/
    type: duckdb

# Built-in copilot for chat Build mode (Cmd+I). Just a model reference;
# the platform supplies the system prompt and tools.
builder_agent:
  model: claude-sonnet-4-6
