controls:
  - name: start_date
    label: Start Date
    type: date
    default: 2010-02-05
  - name: end_date
    label: End Date
    type: date
    default: 2012-10-26
  - name: store
    label: Store
    type: select
    default: All
    source: store_options
  - name: holiday_flag
    label: Holiday Week
    type: select
    default: All

tasks:
  - name: store_options
    type: execute_sql
    database: local
    sql_query: >
      SELECT DISTINCT Store
      FROM oxymart
      ORDER BY Store ASC
    mode: server
  - name: kpi_total_revenue
    type: execute_sql
    database: local
    sql_query: >
      SELECT
      SUM(Weekly_Sales) AS Total_Revenue
      FROM oxymart
      WHERE
      Date BETWEEN
      COALESCE(TRY_STRPTIME({{ controls.start_date | sqlquote }}, '%Y-%m-%d'), DATE '1900-01-01')
      AND
      COALESCE(TRY_STRPTIME({{ controls.end_date | sqlquote }}, '%Y-%m-%d'), DATE '2100-12-31')
      AND ({{ controls.store | sqlquote }} = 'All' OR CAST(Store AS VARCHAR) = {{ controls.store | sqlquote }})
      AND ({{ controls.holiday_flag | sqlquote }} = 'All' OR CAST(Holiday_Flag AS VARCHAR) = {{ controls.holiday_flag | sqlquote }})
    mode: server
  - name: kpi_avg_weekly_sales
    type: execute_sql
    database: local
    sql_query: >
      SELECT AVG(Weekly_Sales) AS Avg_Weekly_Sales
      FROM oxymart
      WHERE (TRY_CAST({{ controls.start_date | sqlquote }} AS DATE) IS NULL OR Date >= TRY_CAST({{ controls.start_date | sqlquote }} AS DATE))
      AND (TRY_CAST({{ controls.end_date | sqlquote }} AS DATE) IS NULL OR Date <= TRY_CAST({{ controls.end_date | sqlquote }} AS DATE))
      AND ({{ controls.store | sqlquote }} = 'All' OR Store = TRY_CAST({{ controls.store | sqlquote }} AS INTEGER))
      AND ({{ controls.holiday_flag | sqlquote }} = 'All' OR Holiday_Flag = TRY_CAST({{ controls.holiday_flag | sqlquote }} AS INTEGER))
    mode: server
  - name: kpi_record_count
    type: execute_sql
    database: local
    sql_query: >
      SELECT COUNT(*) AS Num_Records
      FROM oxymart
      WHERE Date BETWEEN {{ controls.start_date | sqlquote }} AND {{ controls.end_date | sqlquote }}
      AND ({{ controls.store | sqlquote }} = 'All' OR CAST(Store AS VARCHAR) = {{ controls.store | sqlquote }})
      AND ({{ controls.holiday_flag | sqlquote }} = 'All' OR CAST(Holiday_Flag AS VARCHAR) = {{ controls.holiday_flag | sqlquote }})
    mode: server
  - name: revenue_over_time
    type: execute_sql
    database: local
    sql_query: >
      SELECT
      Date,
      SUM(Weekly_Sales) AS Revenue
      FROM oxymart
      WHERE
      (TRY_CAST({{ controls.start_date | sqlquote }} AS DATE) IS NULL OR Date >= TRY_CAST({{ controls.start_date | sqlquote }} AS DATE))
      AND (TRY_CAST({{ controls.end_date | sqlquote }} AS DATE) IS NULL OR Date <= TRY_CAST({{ controls.end_date | sqlquote }} AS DATE))
      AND (TRY_CAST({{ controls.store | sqlquote }} AS INTEGER) IS NULL OR Store = TRY_CAST({{ controls.store | sqlquote }} AS INTEGER))
      AND (TRY_CAST({{ controls.holiday_flag | sqlquote }} AS INTEGER) IS NULL OR Holiday_Flag = TRY_CAST({{ controls.holiday_flag | sqlquote }} AS INTEGER))
      GROUP BY Date
      ORDER BY Date ASC
    mode: server
  - name: revenue_by_store
    type: execute_sql
    database: local
    sql_query: >
      SELECT
      Store,
      SUM(Weekly_Sales) AS Total_Revenue
      FROM oxymart
      WHERE (TRY_CAST({{ controls.start_date | sqlquote }} AS DATE) IS NULL OR Date >= TRY_CAST({{ controls.start_date | sqlquote }} AS DATE))
      AND (TRY_CAST({{ controls.end_date | sqlquote }} AS DATE) IS NULL OR Date <= TRY_CAST({{ controls.end_date | sqlquote }} AS DATE))
      AND (
      {{ controls.holiday_flag | sqlquote }} = 'All'
      OR TRY_CAST({{ controls.holiday_flag | sqlquote }} AS INTEGER) IS NULL
      OR Holiday_Flag = TRY_CAST({{ controls.holiday_flag | sqlquote }} AS INTEGER)
      )
      GROUP BY Store
      ORDER BY Store + 0 ASC
    mode: server
  - name: revenue_detail_table
    type: execute_sql
    database: local
    sql_query: >
      SELECT Store, Date, Weekly_Sales, Holiday_Flag
      FROM oxymart
      WHERE CAST(Date AS VARCHAR) >= {{ controls.start_date | sqlquote }}
      AND CAST(Date AS VARCHAR) <= {{ controls.end_date | sqlquote }}
      AND ({{ controls.store | sqlquote }} = 'All' OR CAST(Store AS VARCHAR) = {{ controls.store | sqlquote }})
      AND ({{ controls.holiday_flag | sqlquote }} = 'All' OR CAST(Holiday_Flag AS VARCHAR) = {{ controls.holiday_flag | sqlquote }})
      ORDER BY Date DESC
    mode: server

display:
  - type: markdown
    content: |
      # 🛒 Revenue Dashboard
      Track OxyMart's weekly sales performance across stores, time periods, and holiday weeks.
  # - type: row
  #   columns: 4
  #   children:
  #     - type: control
  #       name: start_date
  #       control_type: date
  #     - type: control
  #       name: end_date
  #       control_type: date
  #     - type: control
  #       name: store
  #       control_type: select
  #     - type: control
  #       name: holiday_flag
  #       control_type: select
  # - type: row
  #   columns: 3
  #   children:
  #     - type: bar_chart
  #       data: kpi_total_revenue
  #       x: Total_Revenue
  #     - type: bar_chart
  #       data: kpi_avg_weekly_sales
  #       x: Avg_Weekly_Sales
  #     - type: bar_chart
  #       data: kpi_record_count
  #       x: Num_Records
  - type: line_chart
    data: revenue_over_time
    x: Date
    y: Revenue
  - type: bar_chart
    data: revenue_by_store
    x: Store
    y: Total_Revenue
