controls:
  - name: start_date
    label: Start Date
    type: date
    default: 2011-04-28
  - name: end_date
    label: End Date
    type: date
    default: 2026-02-20
  - name: exercise_filter
    label: Exercise
    type: select
    default: All
    source: task_exercise_list
  - name: day_of_week
    label: Day of Week
    type: select
    default: All
    options:
      [All, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
  - name: rpe_filter
    label: RPE Filter
    type: select
    default: All sets
    options:
      [
        All sets,
        Rated only,
        "RPE >= 6",
        "RPE >= 7",
        "RPE >= 8",
        "RPE >= 9",
        RPE = 10,
      ]

tasks:
  - name: task_exercise_list
    type: execute_sql
    database: training
    sql_query: >
      SELECT Exercise
      FROM (
      SELECT 'All' AS Exercise, 0 AS sort_order
      UNION ALL
      SELECT DISTINCT Exercise, 1 AS sort_order
      FROM strength
      WHERE Exercise IS NOT NULL
      AND Exercise != 'All'
      ) sub
      ORDER BY sort_order, Exercise
    mode: server
  - name: task_session_volume
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      Date,
      SUM(Weight * Reps) AS Volume
      FROM strength
      WHERE
      Date >= {{ controls.start_date | sqlquote }}::DATE
      AND Date <= {{ controls.end_date | sqlquote }}::DATE
      AND ({{ controls.exercise_filter | sqlquote }} = 'All' OR Exercise = {{ controls.exercise_filter | sqlquote }})
      AND ("Day of Week" = {{ controls.day_of_week | sqlquote }} OR {{ controls.day_of_week | sqlquote }} = 'All')
      AND (
      {{ controls.rpe_filter | sqlquote }} = 'All sets'
      OR ({{ controls.rpe_filter | sqlquote }} = 'Rated only' AND RPE IS NOT NULL)
      OR ({{ controls.rpe_filter | sqlquote }} = 'RPE >= 6' AND RPE >= 6)
      OR ({{ controls.rpe_filter | sqlquote }} = 'RPE >= 7' AND RPE >= 7)
      OR ({{ controls.rpe_filter | sqlquote }} = 'RPE >= 8' AND RPE >= 8)
      OR ({{ controls.rpe_filter | sqlquote }} = 'RPE >= 9' AND RPE >= 9)
      OR ({{ controls.rpe_filter | sqlquote }} = 'RPE = 10' AND RPE = 10)
      )
      GROUP BY Date
      ORDER BY Date
    mode: server
  - name: task_weekly_volume
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      strftime('%Y-W%W', Date) AS Week,
      SUM(Weight * Reps) AS Volume
      FROM strength
      WHERE
      Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND ({{ controls.exercise_filter | sqlquote }} = 'All' OR Exercise = {{ controls.exercise_filter | sqlquote }})
      AND ({{ controls.day_of_week | sqlquote }} = 'All' OR "Day of Week" = {{ controls.day_of_week | sqlquote }})
      GROUP BY Week
      ORDER BY Week
    mode: server
  - name: task_monthly_volume
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      strftime('%Y-%m', Date) AS Month,
      SUM(Weight * Reps) AS Volume
      FROM strength
      WHERE
      Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND ({{ controls.exercise_filter | sqlquote }} = 'All' OR Exercise = {{ controls.exercise_filter | sqlquote }})
      AND ({{ controls.day_of_week | sqlquote }} = 'All' OR "Day of Week" = {{ controls.day_of_week | sqlquote }})
      GROUP BY strftime('%Y-%m', Date)
      ORDER BY Month
    mode: server
  - name: task_pr_over_time
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      Date,
      MAX(Weight) AS "PR Weight (lbs)"
      FROM strength
      WHERE
      Weight > 0
      AND Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND ({{ controls.exercise_filter | sqlquote }} = 'All' OR Exercise = {{ controls.exercise_filter | sqlquote }})
      AND ({{ controls.day_of_week | sqlquote }} = 'All' OR "Day of Week" = {{ controls.day_of_week | sqlquote }})
      GROUP BY Date
      ORDER BY Date ASC
    mode: server
  - name: task_all_time_prs
    type: execute_sql
    database: training
    sql_query: >
      SELECT *
      FROM (
      SELECT
      Exercise,
      MAX(Weight)        AS "Max Weight (lbs)",
      COUNT(*)           AS "Total Sets",
      SUM(Reps)          AS "Total Reps",
      SUM(Weight * Reps) AS "Total Volume"
      FROM strength
      WHERE
      Weight > 0
      AND Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND (
      {{ controls.exercise_filter | sqlquote }} = 'All'
      OR Exercise = {{ controls.exercise_filter | sqlquote }}
      )
      GROUP BY Exercise
      ORDER BY "Total Volume" DESC
      LIMIT 30
      ) sub
    mode: server
  - name: task_top_exercises_volume
    type: execute_sql
    database: training
    sql_query: >
      WITH top_exercises AS (
      SELECT
      Exercise,
      SUM(Weight * Reps) AS "Total Volume"
      FROM strength
      WHERE
      Weight > 0
      AND Reps > 0
      AND Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND (
      {{ controls.day_of_week | sqlquote }} = 'All'
      OR "Day of Week" = {{ controls.day_of_week | sqlquote }}
      )
      GROUP BY Exercise
      ORDER BY "Total Volume" DESC
      LIMIT 20
      )
      SELECT * FROM top_exercises
    mode: server
  - name: task_training_frequency
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      strftime('%Y-%m', Date) AS Month,
      COUNT(DISTINCT Date) AS "Training Days"
      FROM strength
      WHERE
      Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND (
      {{ controls.day_of_week | sqlquote }} = 'All'
      OR "Day of Week" = {{ controls.day_of_week | sqlquote }}
      )
      GROUP BY strftime('%Y-%m', Date)
      ORDER BY Month
    mode: server
  - name: task_exercises_per_session
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      Date,
      COUNT(DISTINCT Exercise) AS "Unique Exercises"
      FROM strength
      WHERE
      Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND (
      {{ controls.day_of_week | sqlquote }} = 'All'
      OR "Day of Week" = {{ controls.day_of_week | sqlquote }}
      )
      GROUP BY Date
      ORDER BY Date
    mode: server
  - name: task_avg_rpe_per_session
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      Date,
      AVG(RPE) AS "Avg RPE"
      FROM strength
      WHERE
      RPE IS NOT NULL
      AND Date >= {{ controls.start_date | sqlquote }}
      AND Date <= {{ controls.end_date | sqlquote }}
      AND ({{ controls.exercise_filter | sqlquote }} = 'All' OR Exercise = {{ controls.exercise_filter | sqlquote }})
      AND ({{ controls.day_of_week | sqlquote }} = 'All' OR "Day of Week" = {{ controls.day_of_week | sqlquote }})
      GROUP BY Date
      ORDER BY Date
    mode: server
  - name: task_bodyweight_trend
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      DATE("Datetime (Local)") AS "Date",
      "Weight (lbs)"           AS "Body Weight (lbs)"
      FROM body_composition
      WHERE "Weight (lbs)" IS NOT NULL
      AND DATE("Datetime (Local)") >= TRY_CAST({{ controls.start_date | sqlquote }} AS DATE)
      AND DATE("Datetime (Local)") <= TRY_CAST({{ controls.end_date | sqlquote }} AS DATE)
      ORDER BY "Date" ASC
    mode: server
  - name: task_bodyfat_trend
    type: execute_sql
    database: training
    sql_query: >
      SELECT
      DATE("Datetime (Local)") AS "Date",
      "Body Fat % (Omron)" AS "Body Fat %"
      FROM body_composition
      WHERE
      "Body Fat % (Omron)" IS NOT NULL
      AND CAST(DATE("Datetime (Local)") AS VARCHAR) >= {{ controls.start_date | sqlquote }}
      AND CAST(DATE("Datetime (Local)") AS VARCHAR) <= {{ controls.end_date | sqlquote }}
      ORDER BY "Date" ASC
    mode: server

display:
  - type: markdown
    content: |
      # 💪 Strength Training Dashboard
      All-time strength analytics — volume, PRs, frequency, RPE, and body composition. Use the controls above to filter by date range, exercise, day of week, and effort level.
  - type: markdown
    content: |
      The **Flat Barbell Bench Press** leads all exercises with a total volume of nearly **2.96 million lbs** across **3,612 sets**, narrowly edging out the Barbell Deadlift (**2.93M lbs**) and Barbell Squat (**2.66M lbs**), confirming the classic "big three" lifts dominate training output. The Deadlift stands out as the top strength performer with a **385 lb** max, while the Parallel Bar Triceps Dip achieved a surprising **273 lb** max — second only to the Bench Press at **270 lbs** — making it a notable outlier among accessory movements. Training frequency shows a clear surge in mid-2012, with **12 training days in June** and **10 in July**, and again in early 2014 peaking at **15 days in February**, suggesting distinct periods of intensified training commitment. Session volume spiked as high as **16,500** on a single day (2012-07-09), roughly **2.6x** the lowest recorded session of **5,950**, highlighting significant day-to-day variation in training load.
  - type: markdown
    content: |
      ## 🏆 PR Tracking & Strength Progression
      *Select a specific exercise above to see its personal record history. Defaults to the heaviest lift per session across all exercises.*
  - type: row
    columns: 2
    children:
      - type: line_chart
        data: task_pr_over_time
        x: Date
        y: PR Weight (lbs)
      - type: table
        data: task_all_time_prs
        title: All-Time PRs by Exercise (Top 30 by Volume)
  - type: markdown
    content: |
      ## 📊 Training Volume Trends
      *Volume = Weight × Reps × Sets (each row in the database is one set).*
  - type: row
    columns: 2
    children:
      - type: bar_chart
        data: task_weekly_volume
        x: Week
        y: Volume
      - type: bar_chart
        data: task_monthly_volume
        x: Month
        y: Volume
  - type: line_chart
    data: task_session_volume
    x: Date
    y: Volume
  - type: markdown
    content: |
      ## 🎯 Exercise Breakdown & Training Frequency
  - type: row
    columns: 2
    children:
      - type: bar_chart
        data: task_top_exercises_volume
        x: Exercise
        y: Total Volume
      - type: bar_chart
        data: task_training_frequency
        x: Month
        y: Training Days
  - type: markdown
    content: |
      ## 📈 Session Quality Metrics
  - type: row
    columns: 2
    children:
      - type: line_chart
        data: task_exercises_per_session
        x: Date
        y: Unique Exercises
      - type: line_chart
        data: task_avg_rpe_per_session
        x: Date
        y: Avg RPE
  - type: markdown
    content: |
      ## 🏋️ Body Composition
      *Correlate strength gains with physique changes. Body weight from all Omron readings; body fat % from Omron device (290 measurements). Caliper data is too sparse to chart.*
  - type: markdown
    content: |
      Body weight tracking spans over a decade starting from **173.9 lbs** in July 2012, with early readings dropping sharply to **158 lbs** by August 2012 before stabilizing in the **161–170 lbs** range through 2014. Body fat percentage data, available from 2017 onward, reveals a striking pattern: readings were as low as **8.9%** in mid-2017 before surging to **20%** by November 2017 — a jump of over **11 percentage points** in roughly three months, suggesting a significant dietary or lifestyle shift. The subsequent trend from early 2018 shows a gradual recovery downward, declining from **18%** in March 2018 to **14.7%** by June 2018, indicating a sustained cut phase. Together, the two datasets suggest long-term weight management efforts with periodic cycles of lean phases and bulk-up periods.
  - type: row
    columns: 2
    children:
      - type: line_chart
        data: task_bodyweight_trend
        x: Date
        y: Body Weight (lbs)
      - type: line_chart
        data: task_bodyfat_trend
        x: Date
        y: "Body Fat %"
