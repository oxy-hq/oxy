# App builder agent configuration.
#
# The app builder generates a complete .app.yml from a natural-language request.
# It follows the same YAML structure as analytics.agentic.yml.
#
# Database names from config.yml.  All Oxy-supported connector types work here.
# databases:
#   - training

llm:
  ref: openai-4o-mini
  model: gpt-5.4
  max_tokens: 4096
thinking: effort::medium

context:
  - ./semantics/*.view.yml
  - ./semantics/*.topic.yml
  - ./workflows/**/*.procedure.yml
  - ./example_sql/*.sql

