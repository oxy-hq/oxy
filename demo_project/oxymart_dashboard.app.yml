name: ''
description: ''
controls: []
tasks:
- name: monthly_sales_trend
  type: execute_sql
  database: local
  sql_query: SELECT DATE_TRUNC('month', Date) as month, SUM(Weekly_Sales) as total_sales FROM oxymart GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: top_10_stores_by_sales
  type: execute_sql
  database: local
  sql_query: SELECT CAST(Store AS VARCHAR) as Store, SUM(Weekly_Sales) as total_sales FROM oxymart GROUP BY Store ORDER BY total_sales DESC LIMIT 10
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: holiday_vs_non_holiday
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN Holiday_Flag = 1 THEN 'Holiday' ELSE 'Non-Holiday' END as week_type, SUM(Weekly_Sales) as total_sales FROM oxymart GROUP BY Holiday_Flag
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: avg_weekly_sales_by_store
  type: execute_sql
  database: local
  sql_query: SELECT CAST(Store AS VARCHAR) as Store, AVG(Weekly_Sales) as avg_weekly_sales FROM oxymart GROUP BY Store ORDER BY Store
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: unemployment_vs_sales
  type: execute_sql
  database: local
  sql_query: SELECT ROUND(Unemployment, 1) as unemployment_rate, AVG(Weekly_Sales) as avg_weekly_sales FROM oxymart GROUP BY ROUND(Unemployment, 1) ORDER BY unemployment_rate
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: fuel_price_trend
  type: execute_sql
  database: local
  sql_query: SELECT DATE_TRUNC('month', Date) as month, AVG(Fuel_Price) as avg_fuel_price FROM oxymart GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: summary_kpis
  type: execute_sql
  database: local
  sql_query: SELECT COUNT(DISTINCT Store) as total_stores, ROUND(SUM(Weekly_Sales) / 1e6, 2) as total_sales_million, ROUND(AVG(Weekly_Sales), 2) as avg_weekly_sales, COUNT(DISTINCT Date) as total_weeks FROM oxymart
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
display:
- type: markdown
  content: |-
    # 🛒 OxyMart Sales Performance Dashboard
    An interactive overview of weekly sales performance across **45 stores** from **Feb 2010 to Oct 2012**.
- type: table
  data: summary_kpis
  title: 📊 Key Performance Indicators
- type: markdown
  content: '## 📈 Monthly Sales Trend'
- type: line_chart
  x: month
  y: total_sales
  x_axis_label: Month
  y_axis_label: Total Sales ($)
  data: monthly_sales_trend
  series: null
  title: Total Monthly Sales Over Time
- type: markdown
  content: '## 🏆 Top 10 Stores by Total Sales'
- type: bar_chart
  x: Store
  y: total_sales
  title: Top 10 Stores by Total Sales
  data: top_10_stores_by_sales
  series: null
- type: markdown
  content: '## 🎄 Holiday vs Non-Holiday Sales'
- type: pie_chart
  name: week_type
  value: total_sales
  title: 'Sales Distribution: Holiday vs Non-Holiday Weeks'
  data: holiday_vs_non_holiday
- type: markdown
  content: '## 🏪 Average Weekly Sales by Store'
- type: bar_chart
  x: Store
  y: avg_weekly_sales
  title: Average Weekly Sales per Store
  data: avg_weekly_sales_by_store
  series: null
- type: markdown
  content: '## ⛽ Average Fuel Price Trend Over Time'
- type: line_chart
  x: month
  y: avg_fuel_price
  x_axis_label: Month
  y_axis_label: Avg Fuel Price ($)
  data: fuel_price_trend
  series: null
  title: Monthly Average Fuel Price
- type: markdown
  content: '## 📉 Unemployment Rate vs Avg Weekly Sales'
- type: line_chart
  x: unemployment_rate
  y: avg_weekly_sales
  x_axis_label: Unemployment Rate (%)
  y_axis_label: Avg Weekly Sales ($)
  data: unemployment_vs_sales
  series: null
  title: Impact of Unemployment Rate on Avg Weekly Sales
