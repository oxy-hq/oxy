name: ''
description: ''
controls: []
tasks:
- name: monthly_revenue_trend
  type: execute_sql
  database: local
  sql_query: SELECT DATE_TRUNC('month', Date)::VARCHAR AS month, ROUND(SUM(Weekly_Sales), 2) AS monthly_revenue FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: yearly_revenue
  type: execute_sql
  database: local
  sql_query: SELECT YEAR(Date)::VARCHAR AS year, ROUND(SUM(Weekly_Sales), 2) AS yearly_revenue FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: revenue_by_store
  type: execute_sql
  database: local
  sql_query: SELECT 'Store ' || Store::VARCHAR AS store, ROUND(SUM(Weekly_Sales), 2) AS total_revenue FROM 'oxymart_csv' GROUP BY Store ORDER BY total_revenue DESC LIMIT 15
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: holiday_vs_non_holiday
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN Holiday_Flag = 1 THEN 'Holiday' ELSE 'Non-Holiday' END AS period_type, ROUND(SUM(Weekly_Sales), 2) AS total_revenue FROM 'oxymart_csv' GROUP BY Holiday_Flag
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: total_revenue_kpi
  type: execute_sql
  database: local
  sql_query: SELECT ROUND(SUM(Weekly_Sales), 2) AS total_revenue, COUNT(DISTINCT Store) AS total_stores, COUNT(DISTINCT Date) AS total_weeks FROM 'oxymart_csv'
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: sales_by_temperature
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN Temperature < 32 THEN '1. < 32°F (Freezing)' WHEN Temperature < 50 THEN '2. 32–50°F (Cold)' WHEN Temperature < 68 THEN '3. 50–68°F (Cool)' WHEN Temperature < 86 THEN '4. 68–86°F (Warm)' ELSE '5. > 86°F (Hot)' END AS temp_range, ROUND(AVG(Weekly_Sales), 2) AS avg_weekly_sales FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: sales_by_fuel_price
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN Fuel_Price < 2.5 THEN '1. < $2.5' WHEN Fuel_Price < 3.0 THEN '2. $2.5–$3.0' WHEN Fuel_Price < 3.5 THEN '3. $3.0–$3.5' WHEN Fuel_Price < 4.0 THEN '4. $3.5–$4.0' ELSE '5. > $4.0' END AS fuel_price_range, ROUND(AVG(Weekly_Sales), 2) AS avg_weekly_sales FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: sales_by_unemployment
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN Unemployment < 6 THEN '1. < 6%' WHEN Unemployment < 8 THEN '2. 6–8%' WHEN Unemployment < 10 THEN '3. 8–10%' ELSE '4. > 10%' END AS unemployment_range, ROUND(AVG(Weekly_Sales), 2) AS avg_weekly_sales FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
- name: sales_by_cpi
  type: execute_sql
  database: local
  sql_query: SELECT CASE WHEN CPI < 130 THEN '1. < 130' WHEN CPI < 160 THEN '2. 130–160' WHEN CPI < 190 THEN '3. 160–190' WHEN CPI < 220 THEN '4. 190–220' ELSE '5. > 220' END AS cpi_range, ROUND(AVG(Weekly_Sales), 2) AS avg_weekly_sales FROM 'oxymart_csv' GROUP BY 1 ORDER BY 1
  variables: null
  export: null
  dry_run_limit: null
  cache: null
  mode: client
display:
- type: markdown
  content: |-
    # 🛒 OxyMart Revenue Dashboard
    An overview of weekly sales performance across all stores, time periods, and holiday events.
- type: table
  data: total_revenue_kpi
  title: 📊 Key Performance Indicators
- type: line_chart
  x: month
  y: monthly_revenue
  x_axis_label: Month
  y_axis_label: Revenue ($)
  data: monthly_revenue_trend
  series: null
  title: 📈 Monthly Revenue Trend
- type: bar_chart
  x: year
  y: yearly_revenue
  title: 📅 Yearly Revenue
  data: yearly_revenue
  series: null
- type: bar_chart
  x: store
  y: total_revenue
  title: 🏪 Top 15 Stores by Revenue
  data: revenue_by_store
  series: null
- type: pie_chart
  name: period_type
  value: total_revenue
  title: 🎉 Holiday vs Non-Holiday Revenue
  data: holiday_vs_non_holiday
- type: markdown
  content: |-
    ---
    ## 🔍 Factors Affecting Sales
    Exploring how external economic and environmental factors influence average weekly sales.
- type: bar_chart
  x: temp_range
  y: avg_weekly_sales
  title: 🌡️ Avg Weekly Sales by Temperature Range
  data: sales_by_temperature
  series: null
- type: bar_chart
  x: fuel_price_range
  y: avg_weekly_sales
  title: ⛽ Avg Weekly Sales by Fuel Price Range
  data: sales_by_fuel_price
  series: null
- type: bar_chart
  x: unemployment_range
  y: avg_weekly_sales
  title: 👷 Avg Weekly Sales by Unemployment Rate
  data: sales_by_unemployment
  series: null
- type: bar_chart
  x: cpi_range
  y: avg_weekly_sales
  title: 📦 Avg Weekly Sales by CPI (Consumer Price Index)
  data: sales_by_cpi
  series: null
