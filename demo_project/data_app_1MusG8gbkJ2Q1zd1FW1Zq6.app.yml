- name: sales_summary_statistics
  type: execute_sql
  database: local
  sql_query: |2

    SELECT
        ROUND(SUM(Weekly_Sales), 2) AS total_revenue,
        COUNT(*) AS total_orders,
        ROUND(AVG(Weekly_Sales), 2) AS average_order_value,
        COUNT(DISTINCT Store) AS total_customers
    FROM oxymart_csv;
