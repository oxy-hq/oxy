name: Draft Content Changelog

on:
  pull_request:
    types: [ closed ]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to generate changelog for (e.g. 0.5.36)"
        required: true
        type: string

jobs:
  content-changelog:
    name: Draft Content Changelog
    # On pull_request: only run when a release PR (release/X.Y.Z → main) is merged
    # On workflow_dispatch: always run
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        startsWith(github.head_ref, 'release/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Extract release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(echo "${{ github.head_ref }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release PR number
        id: release-pr
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger: try to find the merged release PR by branch name
            PR_NUMBER=$(gh pr list --repo oxy-hq/oxygen-internal \
              --state merged --head "release/${{ steps.version.outputs.version }}" \
              --json number --jq '.[0].number')
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          client-id: ${{ vars.ARGO_APP_CLIENT_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          repositories: |
            oxygen-internal
            oxygen-content

      - name: Checkout oxygen-internal
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout oxygen-content
        uses: actions/checkout@v6
        with:
          repository: oxy-hq/oxygen-content
          token: ${{ steps.app-token.outputs.token }}
          path: oxygen-content
          fetch-depth: 0

      - name: Configure git for oxygen-content
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git -C oxygen-content config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git -C oxygen-content config user.email "${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate and publish changelog draft
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the ARGO app token via the action's `github_token` input (wired to
          # OVERRIDE_GITHUB_TOKEN internally). A step-level `env: GH_TOKEN:` does NOT
          # work — the action generates its own claude[bot] token via OIDC and sets
          # $GH_TOKEN from that inside the Claude runtime, overriding any step env.
          # claude[bot] has no access to oxygen-content, which is why `gh pr create` was
          # silently 404'ing while git push (remote extraheader) still succeeded.
          github_token: ${{ steps.app-token.outputs.token }}
          show_full_output: "true"
          # Bare `Bash` (no prefix) allows any shell command. The previous per-prefix
          # list broke on compound forms (`... 2>/dev/null || true`, `$(date +%Y-%m-%d)`
          # inside quoted bodies). `Edit` is needed for modifying docs.json in place.
          claude_args: --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            Create a user-facing changelog draft in oxy-hq/oxygen-content for Oxy release ${{ steps.version.outputs.version }}.

            There are two modes — pick the right one based on context:

            - **Release PR number:** "${{ steps.release-pr.outputs.number }}"
            - If non-empty → **Mode A** (release PR exists)
            - If empty → **Mode B** (manual trigger, use CHANGELOG.md)

            ---

            ## Step 1 — Gather the list of changes

            ### Mode A: Read the release PR

            1. Fetch the release PR body:
               `gh pr view ${{ steps.release-pr.outputs.number }} --repo oxy-hq/oxygen-internal --json body --jq .body`
            2. Extract every PR number (#NNN) referenced in the body.
            3. For each PR, fetch details:
               `gh pr view NNN --repo oxy-hq/oxygen-internal --json number,title,body,labels,closingIssuesReferences`
            4. Skip PRs titled "chore: release" or that are purely CI/deps/chore.
            5. If a PR body is sparse (< 150 chars after stripping boilerplate), also fetch linked issues:
               `gh issue view ISSUE_NUM --repo oxy-hq/oxygen-internal --json title,body`

            ### Mode B: Read CHANGELOG.md

            1. Read `CHANGELOG.md` in the repo root.
            2. Find the section for `[${{ steps.version.outputs.version }}]` — this is the **target version**.
            3. The section immediately below it is the **previous version**.
               Only the target version section matters — ignore everything else.
            4. From the target version section, extract every PR number (#NNN).
            5. For each PR, fetch details:
               `gh pr view NNN --repo oxy-hq/oxygen-internal --json number,title,body,labels,closingIssuesReferences`
            6. Skip PRs that are purely CI/deps/chore (titled "chore: release", dependency bumps, etc.).
            7. If a PR body is sparse (< 150 chars after stripping boilerplate), also fetch linked issues:
               `gh issue view ISSUE_NUM --repo oxy-hq/oxygen-internal --json title,body`

            ---

            ## Step 2 — Read product and style context

            1. Read `product-context.md` — it explains Oxy's product terminology, features, and
               which components exist. Use it to write descriptions that match how we talk about
               the product to users.
            2. Read `oxygen-content/CLAUDE.md` — follow its format and tone rules exactly.
            3. Read the most recent existing MDX in `oxygen-content/changelog/` as a concrete
               format example to match precisely.

            ---

            ## Step 3 — Write the MDX

            Write a single cohesive, user-facing changelog entry for ${{ steps.version.outputs.version }}.
            - Use `date +%Y-%m-%d` for today's date in the filename and `date` frontmatter field
            - Author: "Luong Vo (luong@oxy.tech)"
            - Immediately after the closing `---` of the frontmatter, add an MDX comment:
              `{/* versions: ${{ steps.version.outputs.version }} */}`
              Do NOT use HTML comments (`<!-- -->`), they are invalid in MDX.
            - **User-facing only**: Focus on features, meaningful bug fixes, and performance improvements
              that a data analyst or business user would notice. Skip: internal refactors, CI/build
              changes, dependency bumps, test-only changes, chore tasks.
            - No image markdown — screenshots are added by the human reviewer.

            ---

            ## Step 4 — Write to oxygen-content

            1. Write the MDX to `oxygen-content/changelog/$(date +%Y-%m-%d).mdx`
            2. In `oxygen-content/docs.json`, prepend `"changelog/$(date +%Y-%m-%d)"` to the top
               of the "Recent Updates" `pages` array inside the "Changelog" tab.

            ---

            ## Step 5 — Create or update the pending PR in oxygen-content

            Ensure the label exists:
            `gh label create --repo oxy-hq/oxygen-content pending-release --color 0075ca --description "Pending changelog draft" 2>/dev/null || true`

            Check for an open PR with that label:
            `gh pr list --repo oxy-hq/oxygen-content --label pending-release --state open --json number,headRefName --jq '.[0]'`

            **If a PR already exists:**
            - Fetch and checkout its branch
            - Read the existing .mdx; merge the new content in (synthesize — no duplicate sections)
            - Update the `{/* versions: ... */}` comment to include ${{ steps.version.outputs.version }}
            - Commit and push
            - Update the PR body to append ${{ steps.version.outputs.version }} to included versions

            **If no open PR:**
            - Delete stale remote branch if present:
              `git -C oxygen-content push origin --delete pending-changelog 2>/dev/null || true`
            - Checkout main, pull, create branch `pending-changelog`
            - Commit and push
            - Create the PR:
              ```
              gh pr create --repo oxy-hq/oxygen-content \
                --title "chore: pending changelog ($(date +%Y-%m-%d))" \
                --label pending-release \
                --head pending-changelog \
                --base main \
                --body "Changelog draft auto-generated from release notes.

              **Included releases:** ${{ steps.version.outputs.version }}

              > Review and curate before merging.
              > Add screenshots to \`changelog/images/$(date +%Y-%m-%d)/\` where helpful.
              > Claude may have missed details or over-included internal changes."
              ```
