name: Weekly Claude Enhancements

on:
  schedule:
    - cron: "30 7 * * 0" # Every Sunday at 15:30 Vietnam time (07:30 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  analyze:
    if: ${{ github.repository == 'oxy-hq/oxygen' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: refactoring
            focus: >-
              duplicated logic, overly complex functions, poor separation of
              concerns, large functions that should be split
          - category: performance
            focus: >-
              inefficient queries, unnecessary clones or allocations, blocking
              calls in async contexts, N+1 patterns
          - category: security
            focus: >-
              unsafe unwraps on external input, potential injection vectors,
              overly broad permissions, unvalidated user data reaching SQL
          - category: test-coverage
            focus: >-
              untested public APIs, missing edge-case tests, flaky test
              patterns, code paths with no coverage
          - category: code-quality
            focus: >-
              missing error handling, inconsistent patterns vs established
              conventions, TODO/FIXME/HACK comments in recently changed files
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: false
          prompt: |
            You are an automated code reviewer for the Oxy monorepo (Rust workspace + React/TypeScript frontend).

            Repository: oxy-hq/oxygen-internal
            Branch: main

            Your task: analyze ONLY the category **${{ matrix.category }}** — ${{ matrix.focus }}.

            Workspace layout:
            - crates/app                          — CLI + HTTP server
            - crates/core                         — Core platform library
            - crates/agent                        — Agent execution engine
            - crates/auth                         — Authentication and authorization
            - crates/semantic                     — Semantic query layer
            - crates/shared                       — Shared types, errors, infrastructure
            - crates/workflow                     — Workflow orchestration
            - crates/thread                       — Thread and conversation management
            - crates/agentic/{core,analytics,connector,llm,http,workflow}
            - crates/infrastructure/llm/{anthropic,gemini,ollama,openai,oxy-llm}
            - web-app/                            — Vite + React + TypeScript

            Steps:
            1. Run `git log --oneline --since="7 days ago"` to identify recently changed files
            2. For each changed file, check specifically for **${{ matrix.category }}** issues
            3. Write your findings to `findings-${{ matrix.category }}.md` in the repo root

            Format each finding exactly like this:

            **N. Short title** — `path/to/file:line`

            One sentence describing the problem.

            ```lang
            // ❌ problematic code
            // ✅ fix
            ```

            [Fix this →](https://claude.ai/code?q=ENCODED_TASK&repo=oxy-hq/oxygen-internal)

            Where ENCODED_TASK is a URL-encoded string like:
            "In path/to/file on branch main, line N has <problem>. <what to fix and how>."

            To URL-encode it, run:
            python3 -c 'import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read().strip()))' <<< "your task description"

            Include at most 3 findings, ranked by impact. If nothing noteworthy, write:
            _No ${{ matrix.category }} issues found this week._

            Do NOT create GitHub issues, PRs, or comments — only write the findings file.

          claude_args: |
            --allowedTools "Read,Glob,Grep,Write,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(python3:*)"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: findings-${{ matrix.category }}
          path: findings-${{ matrix.category }}.md
          if-no-files-found: warn

  create-issue:
    needs: analyze
    if: ${{ github.repository == 'oxy-hq/oxygen' && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          client-id: ${{ vars.ARGO_APP_CLIENT_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            oxygen-internal
            oxygen

      - uses: actions/download-artifact@v8
        with:
          path: findings/
          merge-multiple: false

      - name: Create consolidated GitHub issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DATE=$(date -u +'%Y-%m-%d')

          {
            echo "Automated weekly enhancement suggestions from parallel Claude analysis of commits from the past 7 days."
            echo ""
            for dir in findings/findings-*/; do
              f=$(ls "$dir"*.md 2>/dev/null | head -1)
              [ -n "$f" ] && cat "$f" && echo ""
            done
          } > body.md

          gh issue create \
            --repo oxy-hq/oxygen-internal \
            --title "Weekly Enhancement Suggestions — ${DATE}" \
            --body-file body.md 
