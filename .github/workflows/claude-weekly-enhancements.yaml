name: Weekly Claude Enhancements

on:
  schedule:
    - cron: "30 7 * * 0" # Every Sunday at 15:30 Vietnam time (07:30 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  suggest-enhancements:
    if: ${{ github.repository == 'oxy-hq/oxy-internal' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}

            You are reviewing the Oxy codebase — a Rust workspace with a React/TypeScript frontend.

            Workspace layout:
            - crates/app                      — (oxy-app / oxy binary) CLI + HTTP server, default workspace member
            - crates/core                     — (oxy) Core platform library, published as "oxy"
            - crates/agent                    — (oxy-agent) Agent execution engine
            - crates/auth                     — (oxy-auth) Authentication and authorization
            - crates/entity                   — (entity) Sea-ORM database entity models
            - crates/migration                — (migration) Sea-ORM database migrations
            - crates/semantic                 — (oxy-semantic) Semantic query layer powered by airlayer
            - crates/shared                   — (oxy-shared) Shared types, errors, and infrastructure
            - crates/workflow                 — (oxy-workflow) Workflow orchestration
            - crates/thread                   — (oxy-thread) Thread and conversation management
            - crates/project                  — (oxy-project) Project and workspace management
            - crates/globals                  — (oxy_globals) Global semantics registry and inheritance support
            - crates/omni                     — (omni) Omni integration
            - crates/a2a                      — (a2a) A2A protocol server
            - crates/test-utils               — (oxy-test-utils) Test utilities, fixtures, and mocks
            - crates/agentic/core             — (agentic-core) Generic agentic workflow orchestration framework
            - crates/agentic/analytics        — (agentic-analytics) Analytics domain for the agentic framework
            - crates/agentic/app-builder      — (agentic-app-builder) Data app builder domain for the agentic framework
            - crates/agentic/connector        — (agentic-connector) Database connector trait and backend implementations
            - crates/agentic/db               — (agentic-db) Shared SeaORM entities and migrations for agentic pipeline
            - crates/agentic/http             — (agentic-http) Axum HTTP routes for the agentic analytics pipeline
            - crates/agentic/llm              — (agentic-llm) Shared LLM provider abstraction for agentic domains
            - crates/agentic/workflow         — (agentic-workflow) Procedure runner backed by oxy-workflow
            - crates/infrastructure/llm/anthropic — (oxy-anthropic) Anthropic LLM provider
            - crates/infrastructure/llm/gemini    — (oxy-gemini) Google Gemini provider
            - crates/infrastructure/llm/ollama    — (oxy-ollama) Ollama provider
            - crates/infrastructure/llm/openai    — (oxy-openai) OpenAI provider
            - crates/infrastructure/llm/oxy-llm   — (oxy-llm) Unified LLM abstraction over all providers
            - crates/integration/looker       — (oxy-looker) Looker integration
            - web-app/                        — Frontend (Vite + React + TypeScript)

            Your task is to identify the most impactful improvement opportunities across the codebase from the past week. Focus on:

            1. **Refactoring opportunities** — duplicated logic, overly complex functions, poor separation of concerns
            2. **Performance improvements** — inefficient queries, unnecessary clones/allocations, blocking calls in async contexts
            3. **Code quality** — missing error handling, clippy warnings, inconsistent patterns vs. established conventions
            4. **Security** — unsafe unwraps on external input, potential injection vectors, overly broad permissions
            5. **Test coverage gaps** — untested public APIs, missing edge-case tests, flaky test patterns

            Steps:
            - Review recent commits: `git log --oneline --since="7 days ago"`
            - Inspect the changed files in those commits for the issues above
            - Look at open TODO/FIXME/HACK comments in recently changed files
            - Do NOT check for clippy-style issues (a separate automated job handles that)

            Output:
            - Create a single GitHub issue titled "Weekly Enhancement Suggestions — <date>" using `gh issue create`
            - The issue body should use markdown with one section per category above
            - Only include categories where you found real issues (skip empty sections)
            - For each finding include: file path + line reference, a one-sentence description, and a concrete suggestion
            - Cap the issue at 10 findings total — prioritize by impact

          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(gh issue create:*),Bash(gh issue list:*)"
