name: Weekly Auto-fix

on:
  schedule:
    - cron: "30 7 * * 0" # Every Sunday at 15:30 Vietnam time (07:30 UTC)
  workflow_dispatch:
  workflow_run:
    workflows: ["Open source oxy"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: ${{ github.repository == 'oxy-hq/oxy' && github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Prep cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        id: setup-node
        with:
          node-version: 24.x
          cache: "pnpm"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cargo clippy --fix
        run: cargo clippy --fix --allow-dirty --allow-staged --broken-code --workspace --lib

      - name: Cargo fmt
        run: cargo fmt --all

      - name: pnpm format
        working-directory: web-app
        run: pnpm format

      - name: Get run date
        id: date
        run: echo "value=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: autofix/weekly-${{ github.run_id }}
          commit-message: "chore(${{ steps.date.outputs.value }}): weekly clippy fix, rustfmt, and frontend format"
          title: "chore: weekly auto-fix ${{ steps.date.outputs.value }}"
          body: |
            Automated weekly auto-fix run.

            - `cargo clippy --fix --allow-dirty --allow-staged --broken-code --workspace --lib`
            - `cargo fmt --all`
            - `pnpm format` (Biome)

            Review and merge if the changes look correct.
          delete-branch: true
          labels: "automated,chore"

  close-synced-prs:
    if: >
      github.repository == 'oxy-hq/oxy' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'autofix/weekly-') &&
      contains(github.event.workflow_run.triggering_actor.login, '[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Close autofix PRs after autosync to oxy-internal
        run: |
          gh pr list \
            --repo oxy-hq/oxy \
            --label "automated" \
            --state open \
            --json number,title \
            --jq '.[] | select(.title | startswith("chore: weekly auto-fix")) | .number' \
          | xargs -r -I{} gh pr close {} \
              --repo oxy-hq/oxy \
              --comment "Automatically closed: changes have been synced"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
