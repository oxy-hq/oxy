name: Weekly Auto-fix

on:
  schedule:
    - cron: "30 7 * * 0" # Every Sunday at 15:30 Vietnam time (07:30 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  autofix:
    if: ${{ github.repository == 'oxy-hq/oxy' && github.event_name != 'workflow_run'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug
          }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Prep cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        id: setup-node
        with:
          node-version: 24.x
          cache: "pnpm"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Consolidate Cargo workspace dependencies
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: false
          prompt: |
            You are a Rust workspace dependency consolidation bot working on the Oxy monorepo.

            Goal: find dependencies that are repeated across multiple crates and move them into
            [workspace.dependencies] in the root Cargo.toml so each crate uses `{ workspace = true }`.

            Rules:
            - Only touch [dependencies] sections, never [dev-dependencies] or [build-dependencies]
            - A dep is a candidate if it appears in 3 or more crates with the same (or compatible) version
            - If feature sets differ across crates, use the union of all features in [workspace.dependencies]
            - Never move git-sourced deps (those with `git = ...`) — leave them as-is
            - Never change versions — only consolidate existing pinned versions
            - Preserve `optional = true` on the per-crate entry when moving to workspace
            - Do NOT run any cargo commands — CI on the resulting PR will catch resolution errors
            - CRITICAL: If ANY crate uses `default-features = false` for a dep, the workspace entry
              MUST also have `default-features = false`. Cargo does not allow a crate to set
              `default-features = false` when inheriting a workspace dep that omits it.
              In that case, crates that previously relied on default features must have those
              features added explicitly to their per-crate `features = [...]` list.

            Steps:
            1. Read Cargo.toml (root) to see what is already in [workspace.dependencies] — skip those
            2. Glob all crates/**/Cargo.toml, read each, collect [dependencies] entries with explicit versions
            3. For each candidate dep: add to [workspace.dependencies], replace per-crate entries with `{ workspace = true }` (keeping any `optional = true`)
            4. Output a one-line summary listing which deps were consolidated

          claude_args: |
            --allowedTools "Read,Edit,Glob,Grep"

      - name: Cargo clippy --fix
        run: cargo clippy --fix --allow-dirty --allow-staged --broken-code --workspace
          --lib

      - name: Cargo fmt
        run: cargo fmt --all

      - name: pnpm format
        working-directory: web-app
        run: pnpm format

      - name: Get run date
        id: date
        run: echo "value=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: autofix/weekly-${{ github.run_id }}
          commit-message: "chore(${{ steps.date.outputs.value }}): weekly clippy fix,
            rustfmt, frontend format, workspace dep consolidation"
          title: "chore: weekly auto-fix ${{ steps.date.outputs.value }}"
          body: |
            Automated weekly auto-fix run.

            - Cargo workspace dependency consolidation (via Claude Code Action)
            - `cargo clippy --fix --allow-dirty --allow-staged --broken-code --workspace --lib`
            - `cargo fmt --all`
            - `pnpm format` (Biome)

            Review and merge if the changes look correct.
          delete-branch: true
          labels: "automated,chore"
