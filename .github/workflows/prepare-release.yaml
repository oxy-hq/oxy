name: Prepare Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.x"
    paths-ignore:
      - "docs/**"

jobs:
  # Create or update the release PR with version bump and changelog.
  # Skipped when a release PR is being merged (commit message starts with "chore: release").
  release-pr:
    name: Create/Update Release PR
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Bump version in Cargo.toml
        id: bump
        run: |
          NEW_VERSION=$(python3 scripts/release/bump-version.py)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate full CHANGELOG.md
        run: git cliff --tag ${{ steps.bump.outputs.version }} -o CHANGELOG.md
      - name: Generate release PR body
        run: git cliff --tag ${{ steps.bump.outputs.version }} --unreleased -o /tmp/release-notes.md
      - name: Create or update release PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: release ${{ steps.bump.outputs.version }}"
          branch: release/${{ steps.bump.outputs.version }}
          title: "chore: release ${{ steps.bump.outputs.version }}"
          body-path: /tmp/release-notes.md
          labels: autorelease

  # Create git tag and GitHub release when a release PR is merged.
  # Triggered when the merge commit message starts with "chore: release".
  release:
    name: Tag and Release
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: "true"
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create and push git tag
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        run: git cliff --tag ${{ steps.version.outputs.version }} --latest -o /tmp/release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md

  # Tag the public oxy-hq/oxy repo when a release is created.
  release-public:
    needs: [release]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          repositories: |
            oxy-internal
            oxy
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Wait for publishing oss code to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.ref }}
          check-name: "move-code"
          repo-token: ${{ steps.app-token.outputs.token }}
          wait-interval: 20
      - name: Checkout oss repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: oxy-hq/oxy
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Tag the release
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag ${{ needs.release.outputs.release_version }}
          git push origin ${{ needs.release.outputs.release_version }}
