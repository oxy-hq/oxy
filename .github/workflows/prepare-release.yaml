name: Prepare Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.x"
    paths-ignore:
      - "docs/**"

jobs:
  # Create GitHub releases and push git tags for merged release PRs.
  release:
    name: Release-plz release
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      release_version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5.128
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Extract release version
        id: extract-version
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          version=$(echo '${{ steps.release-plz.outputs.releases }}' | jq -r '.[] | select(.package_name == "oxy-app") | .version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # Create or update the release PR with version bumps and changelog.
  release-pr:
    name: Release-plz PR
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5.128
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # Tag the public oxy-hq/oxy repo when a release is created.
  release-public:
    needs: [release]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          repositories: |
            oxy-internal
            oxy
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Wait for publishing oss code to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.ref }}
          check-name: "move-code"
          repo-token: ${{ steps.app-token.outputs.token }}
          wait-interval: 20
      - name: Checkout oss repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: oxy-hq/oxy
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Tag the release
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag ${{ needs.release.outputs.release_version }}
          git push origin ${{ needs.release.outputs.release_version }}
