name: Prepare Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.x"
    paths-ignore:
      - "docs/**"

jobs:
  # Create or update the release PR with version bump and changelog.
  # Skipped when a release PR is being merged (commit message starts with "chore: release").
  release-pr:
    name: Create/Update Release PR
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Bump version in Cargo.toml
        id: bump
        run: |
          NEW_VERSION=$(uv run scripts/release/bump-version.py)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate full CHANGELOG.md
        run: git cliff --tag ${{ steps.bump.outputs.version }} -o CHANGELOG.md
      - name: Generate release PR body
        run: git cliff --tag ${{ steps.bump.outputs.version }} --unreleased -o /tmp/release-notes.md
      - name: Create or update release PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: release ${{ steps.bump.outputs.version }}"
          branch: release/${{ steps.bump.outputs.version }}
          title: "chore: release ${{ steps.bump.outputs.version }}"
          body-path: /tmp/release-notes.md
          labels: autorelease

  # Create git tag and GitHub release when a release PR is merged.
  # Triggered when the merge commit message starts with "chore: release".
  release:
    name: Tag and Release
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: "true"
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create and push git tag
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        run: git cliff --tag ${{ steps.version.outputs.version }} --latest -o /tmp/release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md

  # Generate a user-facing changelog draft in oxy-hq/oxy-content.
  # Uses claude-code-action so Claude has MCP access (DeepWiki, gh, file tools).
  # Creates a new pending PR or appends to the existing one if unmerged.
  # Requires: ANTHROPIC_API_KEY secret, oxy-content in the GitHub App's repo list.
  content-changelog:
    name: Draft Content Changelog
    needs: [release]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          repositories: |
            oxy-internal
            oxy-content
      - name: Checkout oxy-internal
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        run: git cliff --tag ${{ needs.release.outputs.release_version }} --latest -o /tmp/release-notes.md
      - name: Checkout oxy-content
        uses: actions/checkout@v6
        with:
          repository: oxy-hq/oxy-content
          token: ${{ steps.app-token.outputs.token }}
          path: oxy-content
          fetch-depth: 0
      - name: Configure git for oxy-content
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git -C oxy-content config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git -C oxy-content config user.email "${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Generate and publish changelog draft
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowedTools
            "mcp__deepwiki__ask_question,mcp__deepwiki__read_wiki_contents,
            Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(gh pr edit:*),
            Bash(gh label create:*),Bash(git -C oxy-content:*),Bash(cat:*),Bash(date:*),
            Read,Write,Glob,Grep"
          prompt: |
            Create a user-facing changelog draft in oxy-hq/oxy-content for Oxy release ${{ needs.release.outputs.release_version }}.

            ## Context — gather before writing

            1. Read the cliff release notes:
               `cat /tmp/release-notes.md`

            2. For every PR #NNN referenced in those notes, fetch the full description:
               `gh pr view NNN --repo oxy-hq/oxy-internal --json number,title,body`
               Skip "chore: release" PRs. PR bodies are your primary source of user-facing context.

            3. Use DeepWiki for any feature whose PR description doesn't make the user impact clear:
               `mcp__deepwiki__ask_question(repo="oxy-hq/oxy", question="...")`

            4. Read `product-context.md` for Oxy product terminology and feature map.

            5. Read `oxy-content/CLAUDE.md` — follow it exactly for format and tone.

            ## Generate the MDX

            Write a single cohesive MDX changelog entry.
            - Run `date +%Y-%m-%d` for today's date (filename + frontmatter)
            - Author: "Luong Vo (luong@oxy.tech)"
            - Add `<!-- versions: ${{ needs.release.outputs.release_version }} -->` after the frontmatter `---`
            - No image markdown — screenshots are added manually by the reviewer
            - Skip: internal refactors, CI/build changes, dependency bumps, test-only changes

            ## Write to oxy-content

            1. Write the MDX to `oxy-content/changelog/$(date +%Y-%m-%d).mdx`
            2. In `oxy-content/docs.json`, prepend `"changelog/$(date +%Y-%m-%d)"` to the top of
               the "Recent Updates" `pages` array inside the "Changelog" tab.

            ## Create or update the pending PR

            Ensure the label exists first:
            `gh label create --repo oxy-hq/oxy-content pending-release --color 0075ca --description "Pending changelog draft" 2>/dev/null || true`

            Check for an open PR with that label:
            `gh pr list --repo oxy-hq/oxy-content --label pending-release --state open --json number,headRefName --jq '.[0]'`

            **If a PR exists:** fetch and checkout its branch, append the new release content to
            the existing .mdx (synthesize, do not duplicate sections), commit and push, then update
            the PR body to add "${{ needs.release.outputs.release_version }}" to the included versions.

            **If no open PR:** create branch "pending-changelog" from main (delete remote branch first if stale),
            commit, push, then:
            ```
            gh pr create --repo oxy-hq/oxy-content \
              --title "chore: pending changelog ($(date +%Y-%m-%d))" \
              --label pending-release --head pending-changelog --base main \
              --body "Changelog draft. Included releases: ${{ needs.release.outputs.release_version }}"
            ```

  # Tag the public oxy-hq/oxy repo when a release is created.
  release-public:
    needs: [release]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ${{ github.repository == 'oxy-hq/oxy-internal' && 'ubuntu-slim' || 'ubuntu-latest' }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/create-github-app-token@v3
        name: Create GitHub App Token
        id: app-token
        with:
          app-id: ${{ vars.ARGO_APP_ID }}
          private-key: ${{ secrets.ARGO_APP_PRIVATE_KEY }}
          repositories: |
            oxy-internal
            oxy
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Wait for publishing oss code to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.ref }}
          check-name: "move-code"
          repo-token: ${{ steps.app-token.outputs.token }}
          wait-interval: 20
      - name: Checkout oss repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: oxy-hq/oxy
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Tag the release
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag ${{ needs.release.outputs.release_version }}
          git push origin ${{ needs.release.outputs.release_version }}
