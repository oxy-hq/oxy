# configuration for https://github.com/crate-ci/typos

[default.extend-words]
consts = "consts"
delt = "delt"
AKS = "AKS"
# "PNGs" is flagged because typos sees "PN" as a fragment; it is valid English.
PN = "PN"

[type.md]
extend-ignore-re = [
  "\\[[[:xdigit:]]{7}\\]\\(https://github.com/oxy-hq/oxygen(-internal)?/commit/[[:xdigit:]]{40}\\)",
]

[files]
extend-exclude = ["CHANGELOG.md", "*/docker-entrypoints/*", "*/demo_project/**"]
