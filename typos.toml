# configuration for https://github.com/crate-ci/typos

[default.extend-words]
consts = "consts"
delt = "delt"
AKS = "AKS"

[type.md]
extend-ignore-re = [
  "\\[[[:xdigit:]]{7}\\]\\(https://github.com/oxy-hq/oxy(-internal)?/commit/[[:xdigit:]]{40}\\)",
]

[files]
extend-exclude = ["CHANGELOG.md", "*/docker-entrypoints/*", "*/demo_project/**"]
