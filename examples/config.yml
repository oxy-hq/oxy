# yaml-language-server: $schema=https://raw.githubusercontent.com/oxy-hq/oxy/refs/heads/main/json-schemas/config.json

databases:
  - name: primary_database
    type: bigquery
    key_path: bigquery-sample.key
    datasets:
      airbyte:
        - "typeform_forms__links"
      dbt_prod_core:
        - "*"
      dbt_prod_metrics:
        - "monthly_active_*"
      python_prod:
        - "v1_*"

    # dry_run_limit: 1

  - name: omni_bigquery
    type: bigquery
    # key_path: omni_bigquery.json
    key_path: bigquery-sample.key # this is just here for placeholder
    dataset: dbt_prod_fpx

  - name: local
    type: duckdb
    key_path: None
    dataset: .db/

  - name: snowflake
    type: snowflake
    account: jla01554
    username: jeffthebest
    password_var: SNOWFLAKE_PASSWORD
    warehouse: COMPUTE_WH
    database: DEMO_DB

  - name: postgres
    type: postgres
    host: "localhost"
    port: "5432"
    user: "admin"
    password_var: POSTGRES_PASSWORD
    database: "default"

  - name: mysql
    type: mysql
    host: "localhost"
    port: "3306"
    user: "admin"
    password_var: MYSQL_PASSWORD
    database: "default"

  - name: clickhouse
    type: clickhouse
    host: http://localhost:8123
    user: default
    password_var: CLICKHOUSE_PASSWORD
    database: default
    schemas:
      default:
        - "hacker_news_*"

  - name: domo
    type: domo
    dataset_id: 6ecc3faa-9368-4711-a1ad-b14dca55db53
    developer_token_var: DOMO_DEVELOPER_TOKEN
    instance: hyperquery-ai

models:
  - name: openai-4o-mini
    vendor: openai
    model_ref: gpt-4o-mini
    key_var: OPENAI_API_KEY
  - name: gpt-5-mini-2025-08-07
    vendor: openai
    model_ref: gpt-5-mini-2025-08-07
    key_var: OPENAI_API_KEY
  - name: openai-4o
    vendor: openai
    model_ref: gpt-4o
    key_var: OPENAI_API_KEY
  - name: openai-5.2
    vendor: openai
    model_ref: gpt-5.2
    key_var: OPENAI_API_KEY
  - name: openai-4.1
    vendor: openai
    model_ref: gpt-4.1
    key_var: OPENAI_API_KEY
  - name: openai-4o-with-headers
    vendor: openai
    model_ref: gpt-4o
    key_var: OPENAI_API_KEY
    headers:
      # Direct header value
      X-Custom-Client: "oxy-internal-client"
      # Header value from environment variable (for sensitive data like API keys)
      X-API-Secret:
        env_var: OPENAI_CUSTOM_SECRET
      # Another direct header
      User-Agent: "OxyApp/1.0"

  # - name: openai-4o-mini-azure
  #   vendor: openai
  #   model_ref: openai-4o-mini-azure
  #   api_url: something
  #   azure_deployment_id: "SMART-Automated-gpt-4o"
  #   azure_api_version: "2024-08-01-preview"
  #   key_var: OPENAI_AZURE_KEY
  - name: llama3.2
    vendor: ollama
    model_ref: llama3.2:latest
    api_url: http://localhost:11434/v1
    api_key: secret
  - name: gemini1.5pro
    key_var: GEMINI_API_KEY
    model_ref: gemini-1.5-pro
    vendor: google
  - vendor: anthropic
    name: claude-3-7-sonnet
    model_ref: claude-3-7-sonnet-20250219
    key_var: ANTHROPIC_API_KEY
  - vendor: anthropic
    name: claude-sonnet-4-6
    model_ref: claude-sonnet-4-6
    key_var: ANTHROPIC_API_KEY

defaults:
  database: local

builder_agent:
  model: claude-sonnet-4-6

slack:
  default_agent: agents/default.agent.yml
  oxy_app_url: https://oxy.yourcompany.com # Optional: enables "View in Oxy" deep links in Slack responses
  bot_token_var: SLACK_BOT_TOKEN # Environment variable containing the Slack bot token
  signing_secret_var: SLACK_SIGNING_SECRET # Environment variable containing the Slack signing secret

mcp:
  tools:
    - semantics/topics/fruit_business.topic.yml
    - data/*.sql
    - agents/*.agent.yml
    - procedures/*.procedure.yml

a2a:
  base_url: "http://localhost:3030"
  agents:
    - ref: agents/local.agent.yml
      name: local
    - ref: agents/semantic.agent.yml
      name: semantic

# ── Git branch workflow ────────────────────────────────────────────────────
# When the workspace is a git repository, Oxy's IDE can auto-create a new
# feature branch on save instead of writing directly to a protected branch.
#
# Uncomment and adjust the two fields below to opt in.  See
# https://docs.oxy.tech/reference/branch-configuration for full details.
#
# Scenario A — single long-lived branch (simplest):
#   protected_branches are guarded, new work forks from whatever Oxy has
#   checked out (usually the same branch).  `base_branch` can stay unset.
#
# protected_branches:
#   - main
#
# Scenario B — deployment branch split from integration branch:
#   Oxy serves from `deploy` (e.g. because your cluster points at that ref),
#   but you want new work to fork from `main` so feature branches start from
#   the latest integration commits, not from whatever was last deployed.
#
# protected_branches:
#   - deploy
# base_branch: main
#
# Note: in single-workspace mode (`oxy serve --local`) the protected-branch
# guard is disabled entirely — a single developer on their own checkout writes
# directly to the current branch regardless of these settings.
