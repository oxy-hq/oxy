      ORDER BY total_revenue DESC
    database: local

display:
  - type: control
    name: region
    control_type: select
    label: Region
    options:
      - All
      - North
      - South
      - East
      - West
    default: "All"

  - type: control
    name: year
    control_type: select
    label: Year
    # Jinja-templated options: evaluated at startup so the list always reflects
    # the current year and the two preceding years without editing the app file.
    options:
      - "All"
      - "{{ now(fmt='%Y') }}"
      - "{{ now(fmt='%Y') | int - 1 }}"
      - "{{ now(fmt='%Y') | int - 2 }}"
    default: "All"

  - type: control
    name: start_date
    control_type: date
    label: From Date
    default: "2024-01-01"

  - type: control
    name: holidays_only
    control_type: toggle
    label: Holidays Only
    default: false

  - type: markdown
    content: |
      # Controls Demo

      Use the controls above to filter by **Region**, **Year**, **Date**, and **Holiday periods**.
      Every chart and table re-runs automatically when you change a control.

      The **Year** dropdown options are Jinja-templated — they compute the current year
      and the two preceding years at startup, so this app never needs updating as time passes.

  - type: row
    columns: 2
    children:
      - type: bar_chart
        title: Revenue by Category
        data: revenue_by_category
        x: category
        y: total_revenue

      - type: pie_chart
        title: Revenue by Region
        data: revenue_by_region
        name: region
        value: total_revenue

  - type: table
    title: Filtered Sales Detail
    data: raw_sales
