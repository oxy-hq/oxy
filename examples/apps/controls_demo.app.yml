            ('North',  'Clothing',    'Non-Holiday',  '2024-02-10',  4500),
            ('South',  'Electronics', 'Holiday',     '2024-01-20',  9800),
            ('South',  'Clothing',    'Non-Holiday',  '2024-03-05',  3200),
            ('East',   'Electronics', 'Non-Holiday',  '2024-02-28',  7600),
            ('East',   'Food',        'Holiday',     '2024-04-01',  5100),
            ('West',   'Food',        'Non-Holiday',  '2024-03-15',  6300),
            ('West',   'Clothing',    'Holiday',     '2024-05-10',  8200),
            ('North',  'Food',        'Non-Holiday',  '2024-04-20',  4100),
            ('South',  'Food',        'Holiday',     '2024-06-01',  7700),
            ('East',   'Clothing',    'Non-Holiday',  '2024-05-15',  3900),
            ('West',   'Electronics', 'Non-Holiday',  '2024-06-20', 11200),
            ('North',  'Electronics', 'Non-Holiday',  '2024-07-10',  9300),
            ('South',  'Clothing',    'Holiday',     '2024-08-05',  5600),
            ('East',   'Electronics', 'Holiday',     '2024-09-01', 13400),
            ('West',   'Food',        'Holiday',     '2024-10-15',  6800),
            ('North',  'Clothing',    'Holiday',     '2024-11-25', 10200),
            ('South',  'Electronics', 'Non-Holiday',  '2024-12-10',  8900),
            ('East',   'Food',        'Non-Holiday',  '2024-07-20',  4700),
            ('West',   'Clothing',    'Non-Holiday',  '2024-08-30',  5300),
            ('North',  'Electronics', 'Non-Holiday',  '2025-02-10', 11500),
            ('South',  'Food',        'Holiday',     '2025-05-20',  8500),
            ('East',   'Clothing',    'Non-Holiday',  '2025-08-15',  6200),
            ('West',   'Electronics', 'Holiday',     '2025-11-28', 14500),
