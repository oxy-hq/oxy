name: controls_demo
description: |
  Demonstrates all interactive control types: select (static and Jinja-templated
  options), date picker, and toggle. Controls inject values into task SQL via
  Jinja so the charts and table update live when the user changes a control.
  All queries use inline DuckDB VALUES — no external data file required.
  The `year` control shows Jinja-templated options: the list evaluates
  {{ now(fmt='%Y') }} at startup so it always shows the current year and the
  two preceding years, no matter when the app runs.

# The raw data is defined once as a CTE named `sales` inside each task.
# DuckDB does not share state between tasks, so each query carries its own
# data definition. The VALUES block is intentionally duplicated here rather
# than extracted to a file, to keep this demo self-contained.
tasks:
  - name: raw_sales
    type: execute_sql
    sql_query: |
      WITH sales AS (
        SELECT *
        FROM (
          VALUES
            ('North',  'Electronics', 'Holiday',     '2024-01-15', 12000),
            ('North',  'Clothing',    'Non-Holiday',  '2024-02-10',  4500),
            ('South',  'Electronics', 'Holiday',     '2024-01-20',  9800),
            ('South',  'Clothing',    'Non-Holiday',  '2024-03-05',  3200),
            ('East',   'Electronics', 'Non-Holiday',  '2024-02-28',  7600),
            ('East',   'Food',        'Holiday',     '2024-04-01',  5100),
            ('West',   'Food',        'Non-Holiday',  '2024-03-15',  6300),
            ('West',   'Clothing',    'Holiday',     '2024-05-10',  8200),
            ('North',  'Food',        'Non-Holiday',  '2024-04-20',  4100),
            ('South',  'Food',        'Holiday',     '2024-06-01',  7700),
            ('East',   'Clothing',    'Non-Holiday',  '2024-05-15',  3900),
            ('West',   'Electronics', 'Non-Holiday',  '2024-06-20', 11200),
            ('North',  'Electronics', 'Non-Holiday',  '2024-07-10',  9300),
            ('South',  'Clothing',    'Holiday',     '2024-08-05',  5600),
            ('East',   'Electronics', 'Holiday',     '2024-09-01', 13400),
            ('West',   'Food',        'Holiday',     '2024-10-15',  6800),
            ('North',  'Clothing',    'Holiday',     '2024-11-25', 10200),
            ('South',  'Electronics', 'Non-Holiday',  '2024-12-10',  8900),
            ('East',   'Food',        'Non-Holiday',  '2024-07-20',  4700),
            ('West',   'Clothing',    'Non-Holiday',  '2024-08-30',  5300),
            ('North',  'Electronics', 'Non-Holiday',  '2025-02-10', 11500),
            ('South',  'Food',        'Holiday',     '2025-05-20',  8500),
            ('East',   'Clothing',    'Non-Holiday',  '2025-08-15',  6200),
            ('West',   'Electronics', 'Holiday',     '2025-11-28', 14500),
            ('North',  'Food',        'Non-Holiday',  '2026-01-20',  7800),
            ('South',  'Electronics', 'Holiday',     '2026-02-14', 10500),
            ('East',   'Clothing',    'Non-Holiday',  '2026-03-01',  5800)
        ) AS t(region, category, period, sale_date, revenue)
      )
      SELECT *
      FROM sales
      WHERE ({{ controls.region | sqlquote }} = 'All' OR region = {{ controls.region | sqlquote }})
        AND sale_date >= {{ controls.start_date | sqlquote }}
        AND ({{ controls.year | sqlquote }} = 'All' OR LEFT(sale_date, 4) = {{ controls.year | sqlquote }})
        {% if controls.holidays_only %}AND period = 'Holiday'{% endif %}
    database: local

  - name: revenue_by_category
    type: execute_sql
    sql_query: |
      WITH sales AS (
        SELECT *
        FROM (
          VALUES
            ('North',  'Electronics', 'Holiday',     '2024-01-15', 12000),
            ('North',  'Clothing',    'Non-Holiday',  '2024-02-10',  4500),
            ('South',  'Electronics', 'Holiday',     '2024-01-20',  9800),
            ('South',  'Clothing',    'Non-Holiday',  '2024-03-05',  3200),
            ('East',   'Electronics', 'Non-Holiday',  '2024-02-28',  7600),
            ('East',   'Food',        'Holiday',     '2024-04-01',  5100),
            ('West',   'Food',        'Non-Holiday',  '2024-03-15',  6300),
            ('West',   'Clothing',    'Holiday',     '2024-05-10',  8200),
            ('North',  'Food',        'Non-Holiday',  '2024-04-20',  4100),
            ('South',  'Food',        'Holiday',     '2024-06-01',  7700),
            ('East',   'Clothing',    'Non-Holiday',  '2024-05-15',  3900),
            ('West',   'Electronics', 'Non-Holiday',  '2024-06-20', 11200),
            ('North',  'Electronics', 'Non-Holiday',  '2024-07-10',  9300),
            ('South',  'Clothing',    'Holiday',     '2024-08-05',  5600),
            ('East',   'Electronics', 'Holiday',     '2024-09-01', 13400),
            ('West',   'Food',        'Holiday',     '2024-10-15',  6800),
            ('North',  'Clothing',    'Holiday',     '2024-11-25', 10200),
            ('South',  'Electronics', 'Non-Holiday',  '2024-12-10',  8900),
            ('East',   'Food',        'Non-Holiday',  '2024-07-20',  4700),
            ('West',   'Clothing',    'Non-Holiday',  '2024-08-30',  5300),
            ('North',  'Electronics', 'Non-Holiday',  '2025-02-10', 11500),
            ('South',  'Food',        'Holiday',     '2025-05-20',  8500),
            ('East',   'Clothing',    'Non-Holiday',  '2025-08-15',  6200),
            ('West',   'Electronics', 'Holiday',     '2025-11-28', 14500),
            ('North',  'Food',        'Non-Holiday',  '2026-01-20',  7800),
            ('South',  'Electronics', 'Holiday',     '2026-02-14', 10500),
            ('East',   'Clothing',    'Non-Holiday',  '2026-03-01',  5800)
        ) AS t(region, category, period, sale_date, revenue)
      )
      SELECT category, SUM(revenue) AS total_revenue
      FROM sales
      WHERE ({{ controls.region | sqlquote }} = 'All' OR region = {{ controls.region | sqlquote }})
        AND sale_date >= {{ controls.start_date | sqlquote }}
        AND ({{ controls.year | sqlquote }} = 'All' OR LEFT(sale_date, 4) = {{ controls.year | sqlquote }})
        {% if controls.holidays_only %}AND period = 'Holiday'{% endif %}
      GROUP BY category
      ORDER BY total_revenue DESC
    database: local

  - name: revenue_by_region
    type: execute_sql
    sql_query: |
      WITH sales AS (
