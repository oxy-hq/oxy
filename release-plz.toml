[workspace]
# publish = false in Cargo.toml causes release-plz to skip packages in the
# release path even with git_only = true (release-plz/release-plz#2693).
# git_only = true here prevents crates.io publishing without triggering that bug.
git_only = true
# All packages share a single unqualified version tag (e.g. "0.5.33").
# This must match git_tag_name on the oxy-app package so every package
# finds the same tag when git_only looks up the latest release.
git_tag_name = "{{ version }}"
git_tag_enable = false
semver_check = false
publish_no_verify = true
release_always = true
# GitHub releases are created by release.yaml when a git tag is pushed
git_release_enable = false
# Single root changelog instead of per-crate changelogs
changelog_update = false

[changelog]
trim = true
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
commit_parsers = [
  # Visible sections
  { message = "^feat",    group = "🚀 Features" },
  { message = "^feature", group = "🚀 Features" },
  { message = "^fix",     group = "🐛 Bug Fixes" },
  { message = "^perf",    group = "⚡ Performance" },
  { message = "^revert",  group = "◀️ Revert" },
  # Hidden sections
  { message = "^docs",     skip = true },
  { message = "^style",    skip = true },
  { message = "^chore",    skip = true },
  { message = "^refactor", skip = true },
  { message = "^test",     skip = true },
  { message = "^build",    skip = true },
  { message = "^ci",       skip = true },
]

# Only oxy-app pushes a git tag (without "v" prefix) to trigger release.yaml
# and maintains the single root CHANGELOG.md, including commits from all crates.
[[package]]
name = "oxy-app"
git_tag_enable = true
git_tag_name = "{{ version }}"
changelog_update = true
changelog_path = "CHANGELOG.md"
changelog_include = [
  "a2a",
  "agentic-analytics",
  "agentic-connector",
  "agentic-core",
  "agentic-db",
  "agentic-http",
  "agentic-llm",
  "agentic-workflow",
  "entity",
  "migration",
  "omni",
  "oxy",
  "oxy_globals",
  "oxy-agent",
  "oxy-anthropic",
  "oxy-auth",
  "oxy-gemini",
  "oxy-llm",
  "oxy-looker",
  "oxy-ollama",
  "oxy-openai",
  "oxy-project",
  "oxy-semantic",
  "oxy-shared",
  "oxy-test-utils",
  "oxy-thread",
  "oxy-workflow",
  "oxy-web",
]
