[package]
name = "agentic-http"
description = "Axum HTTP routes for the agentic analytics pipeline"
version = "0.5.31"
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[dependencies]
agentic-analytics = { path = "../analytics" }
agentic-app-builder = { path = "../app-builder" }
agentic-connector = { path = "../connector", features = [
    "duckdb",
    "postgres",
    "clickhouse",
    "snowflake",
    "bigquery",
] }
agentic-core = { path = "../core" }
agentic-db = { path = "../db" }
agentic-workflow = { path = "../workflow" }
oxy = { path = "../../core" }
oxy-workflow = { path = "../../workflow" }
async-trait = "0.1"

# Web
axum = { workspace = true }
async-stream = "0.3"

# Database
sea-orm = { workspace = true }

# Async
tokio = { workspace = true }

# State
dashmap = "5"
uuid = { workspace = true }

# Serde / JSON
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
chrono = { workspace = true }

# Logging
tracing = { workspace = true }
