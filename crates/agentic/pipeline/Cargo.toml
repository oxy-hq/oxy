[package]
name = "agentic-pipeline"
description = "High-level API for starting and driving agentic pipelines"
version = "0.5.31"
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[dependencies]
agentic-analytics = { workspace = true }
agentic-builder = { workspace = true }
agentic-connector = { workspace = true, features = [
    "duckdb",
    "postgres",
    "clickhouse",
    "snowflake",
    "bigquery",
] }
agentic-core = { workspace = true }
agentic-llm = { workspace = true }
agentic-runtime = { workspace = true }
agentic-workflow = { workspace = true }
async-trait = { workspace = true }
serde_yaml = { workspace = true }

sea-orm = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
sea-orm-migration = { workspace = true }
tempfile = { workspace = true }
testcontainers = { version = "0.27", features = ["blocking", "reusable-containers"] }
testcontainers-modules = { version = "0.15", features = ["postgres"] }
airlayer = { git = "https://github.com/oxy-hq/airlayer.git", rev = "b8c734d" }
