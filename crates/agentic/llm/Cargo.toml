[package]
name = "agentic-llm"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Shared LLM provider abstraction for agentic domains"
license = "MIT"

[dependencies]
agentic-core = { path = "../core" }
async-stream = "0.3"
async-trait = "0.1"
futures-core = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
tokio-stream = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync"] }
