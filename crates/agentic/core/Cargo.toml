[package]
name = "agentic-core"
description = "Generic agentic workflow orchestration framework"
version = "0.5.32"
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[features]
storage = []

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
futures-core = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["sync", "fs", "io-util"] }
tokio-stream = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync", "net", "io-util"] }
tempfile = "3"
