[package]
name = "agentic-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Generic agentic workflow orchestration framework"
license = "MIT"

[features]
storage = []

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
futures-core = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["sync", "fs", "io-util"] }
tokio-stream = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync", "net", "io-util"] }
tempfile = "3"
