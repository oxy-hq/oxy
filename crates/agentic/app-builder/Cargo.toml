[package]
name = "agentic-app-builder"
description = "Data app builder domain for the agentic workflow framework"
version = "0.5.31"
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[features]
duckdb = ["agentic-connector/duckdb"]

[dependencies]
agentic-core = { path = "../core" }
agentic-connector = { path = "../connector" }
agentic-analytics = { path = "../analytics" }
agentic-llm = { path = "../llm" }
async-trait = "0.1"
futures-core = "0.3"
glob = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["sync"] }
regex = "1"
tracing = "0.1"
sqlparser = { version = "0.53", features = ["visitor"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync"] }
tokio-stream = "0.1"
async-trait = "0.1"
