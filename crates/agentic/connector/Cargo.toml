[package]
name = "agentic-connector"
description = "Database connector trait, configuration, and backend implementations"
version.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[features]
duckdb = ["dep:duckdb", "dep:slugify"]
postgres = ["dep:tokio-postgres"]
clickhouse = ["dep:reqwest", "dep:serde_json", "dep:serde"]
snowflake = ["dep:snowflake-api", "dep:arrow", "dep:serde_json"]
bigquery = ["dep:gcp-bigquery-client"]

[dependencies]
agentic-core = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt"] }
tracing = { workspace = true }

# DuckDB
duckdb = { workspace = true, optional = true }
slugify = { workspace = true, optional = true }

# Postgres
tokio-postgres = { workspace = true, features = ["with-chrono-0_4"], optional = true }
chrono = { workspace = true, optional = true }

# ClickHouse (HTTP API)
reqwest = { workspace = true, features = ["rustls-tls", "json"], optional = true }
serde_json = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }

# Snowflake
snowflake-api = { workspace = true, optional = true }
arrow = { workspace = true, features = ["json"], optional = true }

# BigQuery
gcp-bigquery-client = { workspace = true, optional = true }

[dev-dependencies]
duckdb = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tempfile = { workspace = true }
