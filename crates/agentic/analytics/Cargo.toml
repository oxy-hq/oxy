[package]
name = "agentic-analytics"
description = "Analytics domain implementation for the agentic workflow framework"
version.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[features]
# Enable the DuckDB connector in AgentConfig::build_solver (scans CSV/Parquet dirs).
duckdb = ["agentic-connector/duckdb"]
# Enable real-DuckDB integration tests (not for CI without bundled DuckDB).
duckdb-test = ["dep:duckdb"]

[dependencies]
agentic-core = { workspace = true }
agentic-connector = { workspace = true }
agentic-llm = { workspace = true }
agentic-runtime = { workspace = true }
sea-orm = { workspace = true }
sea-orm-migration = { workspace = true }
duckdb = { workspace = true, optional = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
futures-core = { workspace = true }
glob = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream"] }
schemars = { workspace = true, features = ["derive", "impl_json_schema"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sqlparser = { workspace = true, features = ["visitor"] }
statrs = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt", "macros"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
airlayer = { workspace = true }
strsim = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "sync",
    "net",
    "io-util",
] }
async-trait = { workspace = true }
rusqlite = { workspace = true, features = ["bundled"] }
