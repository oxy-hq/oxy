[package]
name = "agentic-workflow"
description = "Procedure runner backed by oxy-workflow for the agentic framework"
version.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

[dependencies]
agentic-core = { workspace = true }
agentic-analytics = { workspace = true }
oxy-workflow = { workspace = true }
oxy = { workspace = true }
oxy-shared = { workspace = true }

async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
strsim = "0.11"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
