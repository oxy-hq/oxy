[package]
name = "agentic-builder"
description = "Built-in copilot builder agent for reading and modifying project files"
version.workspace = true
authors.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
agentic-core = { workspace = true }
agentic-llm = { workspace = true }
async-trait = "0.1"
oxy = { workspace = true }
glob = "0.3"
oxy_globals = { workspace = true }
oxy-semantic = { workspace = true }
oxy-workflow = { workspace = true }
arrow = { version = "=56.2.0", default-features = false, features = ["json"] }
regex = "1"
schemars = { version = "0.8.22", features = ["derive", "impl_json_schema"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "fs", "io-util"] }
uuid = { workspace = true }
tracing = { workspace = true }
