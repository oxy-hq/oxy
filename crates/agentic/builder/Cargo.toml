[package]
name = "agentic-builder"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Built-in copilot builder agent for reading and modifying project files"

[dependencies]
agentic-core = { path = "../core" }
agentic-llm = { path = "../llm" }
async-trait = "0.1"
oxy = { path = "../../core" }
glob = "0.3"
oxy_globals = { path = "../../globals" }
oxy-semantic = { path = "../../semantic" }
oxy-workflow = { path = "../../workflow" }
arrow = { version = "=56.2.0", default-features = false, features = ["json"] }
regex = "1"
schemars = { version = "0.8.22", features = ["derive", "impl_json_schema"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "fs", "io-util"] }
uuid = { workspace = true }
tracing = { workspace = true }
