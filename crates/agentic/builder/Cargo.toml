[package]
name = "agentic-builder"
description = "Built-in copilot builder agent for reading and modifying project files"
version.workspace = true
authors.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
agentic-connector = { workspace = true }
agentic-core = { workspace = true }
agentic-llm = { workspace = true }
agentic-runtime = { workspace = true }
arrow = { workspace = true, features = ["json"] }
async-trait = { workspace = true }
glob = { workspace = true }
regex = { workspace = true }
schemars = { workspace = true, features = ["derive", "impl_json_schema"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "fs", "io-util"] }
tokio-util = { workspace = true, features = ["rt"] }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
