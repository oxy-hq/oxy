[package]
name = "agentic-builder"
description = "Built-in copilot builder agent for reading and modifying project files"
version.workspace = true
authors.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
agentic-core = { workspace = true }
agentic-llm = { workspace = true }
async-trait = { workspace = true }
oxy = { workspace = true }
glob = { workspace = true }
oxy_globals = { workspace = true }
oxy-semantic = { workspace = true }
oxy-workflow = { workspace = true }
arrow = { workspace = true, features = ["json"] }
regex = { workspace = true }
schemars = { workspace = true, features = ["derive", "impl_json_schema"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "fs", "io-util"] }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
