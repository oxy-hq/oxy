[package]
name = "oxy"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
# Override workspace exclude to prevent rebuilds from runtime-generated files
exclude = [
  "examples/",
  # Runtime-generated directories that should not trigger rebuilds
  "demo_project/.db/",
  "demo_project/.databases/",
  "demo_project/.lancedb/",
  "demo_project/.checkpoint/",
  "demo_project/.oxy_state/",
  "demo_project/consistency-test-results.json",
  ".db-*/",
  ".databases/",
  ".lancedb/",
  ".checkpoint/",
  ".oxy_state/",
  ".fastembed_cache/",
  "output/",
  "*.log",
  "postgres_data/",
]

[dependencies]
aes-gcm = { workspace = true }
anyhow = { workspace = true }
argon2 = { workspace = true }
arrow = { workspace = true, features = ["json"] } # arrow version has to comply with duckdb version
assert_cmd = { workspace = true }
async-openai = { workspace = true, features = [
  "byot",
  "chat-completion-types",
  "response-types",
  "_api",
  "responses",
  "chat-completion",
  "embedding-types",
  "embedding",
] }
async-stream = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true, features = ["macros", "http2"] }
axum-server = { workspace = true }
base64 = { workspace = true }
bollard = { workspace = true }
bcrypt = { workspace = true }
chrono = { workspace = true }
chrono-english = { workspace = true }
clap = { workspace = true, features = ["derive"] }
clickhouse = { workspace = true, features = ["rustls-tls"] }
colored = { workspace = true }
connectorx = { workspace = true, features = ["dst_arrow", "src_bigquery", "src_postgres", "src_mysql"] }
csv = { workspace = true }
dirs = { workspace = true }
dotenv = { workspace = true }
duckdb = { workspace = true }
email_address = { workspace = true }
entity = { workspace = true }
omni = { workspace = true }
oxy-looker = { workspace = true }
oxy-observability = { workspace = true, features = ["duckdb", "postgres", "clickhouse"] }
# oxy-config moved back into core/src/config to avoid circular dependency
oxy-anthropic = { workspace = true }
oxy-gemini = { workspace = true }
oxy-git = { workspace = true }
oxy-llm = { workspace = true }
oxy-ollama = { workspace = true }
oxy-openai = { workspace = true }
oxy-semantic = { workspace = true }
oxy-shared = { workspace = true }
oxy_globals = { workspace = true }
# Cannot add oxy-agent, oxy-workflow, etc. here due to circular dependency
# They depend on oxy, so oxy cannot depend on them
# Use them via CLI crate instead
a2a = { workspace = true }
enum_dispatch = { workspace = true }
futures = { workspace = true }
garde = { workspace = true, features = ["full"] }
glob = { workspace = true }
wildcard = { workspace = true }
home = { workspace = true }
human-panic = { workspace = true }
humantime = { workspace = true }
include_dir = { workspace = true }
indoc = { workspace = true }
itertools = { workspace = true }
jsonwebtoken = { workspace = true, features = ["aws_lc_rs"] }
lancedb = { workspace = true }
lazy_static = { workspace = true }
libc = { workspace = true }
lettre = { workspace = true }
log = { workspace = true }
migration = { workspace = true }
minijinja = { workspace = true, features = ["loader"] }
once_cell = { workspace = true }
predicates = { workspace = true }
pulldown-cmark = { workspace = true }
rand = { workspace = true }
schemars = { workspace = true, features = ["derive", "impl_json_schema"] }
scopeguard = { workspace = true }
sea-orm = { workspace = true }
serde = { workspace = true }
serde_arrow = { workspace = true, features = ["arrow-57"] }
serde_json = { workspace = true }
serde_urlencoded = { workspace = true }
self_update = { workspace = true }
slugify = { workspace = true }
sqlformat = { workspace = true }
syntect = { workspace = true }
tabled = { workspace = true }
terminal-light = { workspace = true }
terminal_size = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["fs", "cors", "trace", "timeout", "compression-gzip"] }
tower-serve-static = { workspace = true }
tqdm = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
reqwest = { workspace = true }
secrecy = { workspace = true }
fxhash = { workspace = true }
deser-incomplete = { workspace = true }
snowflake-api = { workspace = true }
rmcp = { workspace = true, features = ["server", "transport-sse-server", "transport-io"] }
serde_with = { workspace = true }
# we use chrono::DateTimeWithTimeZone, which is not currently supported by utoipa
# need to use this until this PR is released https://github.com/juhaku/utoipa/pull/1367
utoipa = { workspace = true, features = ["uuid", "chrono", "axum_extras"] }
utoipa-axum = { workspace = true }
utoipa-swagger-ui = { workspace = true, features = ["axum"] }
strip-ansi-escapes = { workspace = true }
regex = { workspace = true }
url = { workspace = true }
gcp-bigquery-client = { workspace = true }
fehler = { workspace = true }
sqlparser = { workspace = true }
sqlparser_connectorx = { package = "sqlparser", version = "0.37" }
backoff = { workspace = true, features = ["tokio"] }
rustc_version_runtime = { workspace = true }
apalis = { workspace = true }
apalis-core = { workspace = true }
apalis-sql = { workspace = true, features = ["postgres", "tokio"] }
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "postgres"] }
semver = { workspace = true }
rustls = { workspace = true, features = ["aws_lc_rs"] }
parquet = { workspace = true } # needs to be the same with arrow version
short-uuid = { workspace = true }
rapidfuzz = { workspace = true }
indexmap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "json"] }
tracing-appender = { workspace = true }
tracing-log = { workspace = true }
jsonschema = { workspace = true }
ndarray = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
serde_yaml = { workspace = true }
urlencoding = { workspace = true }
tempfile = { workspace = true }
constant_time_eq = { workspace = true }
xxhash-rust = { workspace = true, features = ["xxh3"] }
aho-corasick = { workspace = true }
rkyv = { workspace = true, features = ["validation"] }
sentry = { workspace = true }
df-interchange = { workspace = true, features = ["arrow_54", "arrow_57"] }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
oxy-test-utils = { workspace = true }

[lib]
name = "oxy"
crate-type = ["cdylib", "rlib"]

[features]
default = []
