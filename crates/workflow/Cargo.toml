[package]
authors.workspace = true
description = "Workflow orchestration for Oxy"
documentation.workspace = true
edition.workspace = true
name = "oxy-workflow"
publish.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
# Async runtime
async-trait = "0.1.89"
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# Error handling
anyhow = "1.0"
thiserror = { workspace = true }

# Logging
log = { workspace = true }
tracing = { workspace = true }

# Utilities
arrow = { version = "=56.2.0", default-features = false, features = ["json"] }
chrono = { workspace = true }
chrono-english = "0.1.8"
csv = "1.4.0"
fxhash = "0.2.1"
indexmap = { workspace = true }
itertools = "0.14.0"
jsonschema = "0.33.0"
minijinja = { workspace = true, features = ["loader"] }
regex = { workspace = true }
schemars = { version = "0.8.22", features = ["derive", "impl_json_schema"] }
slugify = "0.1.0"
sqlformat = { git = "https://github.com/shssoichiro/sqlformat-rs.git", rev = "80255c7" }
strip-ansi-escapes = "=0.2.1"
utoipa = { git = "https://github.com/haitrr/utoipa.git", rev = "776f86e", features = [
    "uuid",
    "chrono",
    "axum_extras",
] }
uuid = { workspace = true }

# Database
entity = { workspace = true }
sea-orm = { workspace = true }

# Semantic engine
oxy-semantic = { workspace = true }
airlayer = { git = "https://github.com/oxy-hq/airlayer.git", tag = "v0.0.9" }

# Shared infrastructure
oxy-agent = { workspace = true }
oxy-shared = { workspace = true }
# oxy-config = { path = "../config" }  # Access via oxy::config instead
oxy = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
