[package]
authors.workspace = true
description = "Workflow orchestration for Oxy"
documentation.workspace = true
edition.workspace = true
name = "oxy-workflow"
publish.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
# Async runtime
async-trait = { workspace = true }
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
log = { workspace = true }
tracing = { workspace = true }

# Utilities
arrow = { workspace = true, features = ["json"] }
chrono = { workspace = true }
chrono-english = { workspace = true }
csv = { workspace = true }
fxhash = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
jsonschema = { workspace = true }
minijinja = { workspace = true, features = ["loader"] }
regex = { workspace = true }
schemars = { workspace = true, features = ["derive", "impl_json_schema"] }
slugify = { workspace = true }
sqlformat = { workspace = true }
strip-ansi-escapes = { workspace = true }
utoipa = { workspace = true, features = ["uuid", "chrono", "axum_extras"] }
uuid = { workspace = true }

# Database
entity = { workspace = true }
sea-orm = { workspace = true }

# Semantic engine
oxy-semantic = { workspace = true }
airlayer = { workspace = true }

# Shared infrastructure
oxy-agent = { workspace = true }
oxy-shared = { workspace = true }
# oxy-config = { path = "../config" }  # Access via oxy::config instead
oxy = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
